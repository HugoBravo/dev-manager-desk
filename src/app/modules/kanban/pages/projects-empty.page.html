<section class="empty-wrapper">
  <mat-card appearance="outlined" class="empty-card">
    <mat-card-header>
      <mat-icon mat-card-avatar aria-hidden="true">folder_open</mat-icon>
      <mat-card-title>Select a project to start</mat-card-title>
      <mat-card-subtitle>Pick one from the toolbar picker.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>
        Use the project picker in the top toolbar to choose which project you
        want to work with. Your selection is remembered across reloads.
      </p>
      @if (current(); as active) {
        <p class="active-hint">
          Current project: <strong>{{ active.name }}</strong>
        </p>
      }
    </mat-card-content>
  </mat-card>
</section>
