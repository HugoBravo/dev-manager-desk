<h2 #titleRef mat-dialog-title id="column-editor-title" tabindex="-1">
  {{ title() }}
</h2>
<mat-dialog-content>
  <form
    novalidate
    (submit)="onSubmit($event)"
    aria-labelledby="column-editor-title"
    class="column-editor-form"
  >
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input
        #nameInput
        matInput
        type="text"
        autocomplete="off"
        [formField]="columnForm.name"
        aria-describedby="name-errors"
      />
      @if (columnForm.name().errors().length > 0) {
        <mat-error id="name-errors">
          {{ columnForm.name().errors()[0].message }}
        </mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    (click)="cancel()"
    aria-label="Cancel"
  >
    Cancel
  </button>
  <button
    mat-flat-button
    color="primary"
    type="submit"
    [disabled]="columnForm().invalid()"
    (click)="onSubmit($event)"
    [attr.aria-label]="title()"
  >
    @if (columnForm().submitting()) {
      <mat-progress-spinner diameter="18"></mat-progress-spinner>
      <span>Saving…</span>
    } @else {
      <span>Save</span>
    }
  </button>
</mat-dialog-actions>
