<mat-sidenav-container class="shell-container" autosize>
  <mat-sidenav
    #sidenav
    class="shell-sidenav"
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    [disableClose]="!isHandset()"
  >
    <mat-nav-list aria-label="Menu principal">
      <a
        mat-list-item
        routerLink="projects"
        routerLinkActive="active-link"
        ariaCurrentWhenActive="page"
        (click)="closeSidenavIfHandset()"
      >
        <mat-icon matListItemIcon>folder</mat-icon>
        <span matListItemTitle>Projects</span>
      </a>
      <a
        mat-list-item
        routerLink="kanban"
        routerLinkActive="active-link"
        ariaCurrentWhenActive="page"
        (click)="closeSidenavIfHandset()"
      >
        <mat-icon matListItemIcon>view_kanban</mat-icon>
        <span matListItemTitle>KANBAN</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar color="primary" class="shell-toolbar">
      <button
        mat-icon-button
        type="button"
        class="shell-toggle"
        (click)="toggleSidenav()"
        [attr.aria-expanded]="sidenavOpened()"
        aria-controls="primary-sidenav"
        aria-label="Alternar menu lateral"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <span class="shell-title">Dev Manager Desk</span>

      <span class="shell-spacer"></span>

      <app-toolbar-project-picker class="shell-picker"></app-toolbar-project-picker>

      <button
        mat-icon-button
        type="button"
        class="shell-theme"
        [matMenuTriggerFor]="themeMenu"
        [attr.aria-label]="'Cambiar tema (actual: ' + themeMode() + ')'"
        matTooltip="Tema"
      >
        <mat-icon>{{ themeIcon() }}</mat-icon>
      </button>
      <mat-menu #themeMenu="matMenu" xPosition="before">
        <button
          mat-menu-item
          type="button"
          (click)="setThemeMode('light')"
          [class.theme-menu-active]="themeMode() === 'light'"
        >
          <mat-icon>light_mode</mat-icon>
          <span>Claro</span>
        </button>
        <button
          mat-menu-item
          type="button"
          (click)="setThemeMode('dark')"
          [class.theme-menu-active]="themeMode() === 'dark'"
        >
          <mat-icon>dark_mode</mat-icon>
          <span>Oscuro</span>
        </button>
        <button
          mat-menu-item
          type="button"
          (click)="setThemeMode('system')"
          [class.theme-menu-active]="themeMode() === 'system'"
        >
          <mat-icon>brightness_auto</mat-icon>
          <span>Sistema</span>
        </button>
      </mat-menu>

      @if (user(); as currentUser) {
        <span class="shell-user" aria-label="Usuario autenticado">
          {{ currentUser.name }}
        </span>
      }

      <button
        mat-icon-button
        type="button"
        class="shell-logout"
        (click)="logout()"
        aria-label="Cerrar sesion"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="shell-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
