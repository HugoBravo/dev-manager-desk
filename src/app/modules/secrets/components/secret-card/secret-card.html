<article
  class="secret-card"
  [attr.aria-label]="ariaLabel()"
  [attr.data-testid]="'secret-card-' + secret().id"
>
  <header class="secret-card-header">
    <h3 class="secret-card-key" data-testid="secret-card-key">{{ secret().key }}</h3>
    <div class="secret-card-actions">
      <button
        type="button"
        class="secret-card-action"
        aria-label="Edit secret value or description"
        (click)="onEditClick()"
        data-testid="secret-card-edit"
      >
        <mat-icon aria-hidden="true">edit</mat-icon>
      </button>
      <button
        type="button"
        class="secret-card-action"
        aria-label="Delete secret"
        (click)="onDeleteClick()"
        data-testid="secret-card-delete"
      >
        <mat-icon aria-hidden="true">delete</mat-icon>
      </button>
    </div>
  </header>

  @if (secret().description) {
    <p class="secret-card-description" data-testid="secret-card-description">
      {{ secret().description }}
    </p>
  }

  <div class="secret-card-value-row">
    <code class="secret-card-value" [class.revealed]="revealed()" data-testid="secret-card-value">
      {{ displayValue() }}
    </code>
    <button
      type="button"
      class="secret-card-reveal"
      [attr.aria-label]="revealed() ? 'Hide value' : 'Show value'"
      [attr.aria-pressed]="revealed() ? 'true' : 'false'"
      (click)="toggleReveal()"
      data-testid="secret-card-reveal-toggle"
    >
      <mat-icon aria-hidden="true">
        {{ revealed() ? 'visibility_off' : 'visibility' }}
      </mat-icon>
    </button>
    <button
      mat-stroked-button
      type="button"
      class="secret-card-copy"
      (click)="copyValue()"
      data-testid="secret-card-copy"
      [attr.aria-label]="'Copy value of ' + secret().key"
    >
      <mat-icon aria-hidden="true">content_copy</mat-icon>
      Copy
    </button>
  </div>

  <footer class="secret-card-footer">
    <span class="secret-card-meta">Updated {{ updatedAt() }}</span>
  </footer>
</article>
