<h2 mat-dialog-title id="secret-delete-title" class="secret-delete-title">
  <mat-icon aria-hidden="true">warning_amber</mat-icon>
  Delete secret?
</h2>
<mat-dialog-content class="secret-delete-content">
  <p id="secret-delete-message" class="secret-delete-message">
    You are about to permanently delete
    <strong>{{ data.secretKey }}</strong
    >. This cannot be undone. Any service depending on this key will lose access immediately.
  </p>
  <form
    novalidate
    (submit)="onConfirm($event)"
    class="secret-delete-form"
    aria-labelledby="secret-delete-title"
    aria-describedby="secret-delete-message"
  >
    <mat-form-field appearance="outline" class="secret-delete-field">
      <input
        #confirmationInput
        matInput
        type="text"
        autocomplete="off"
        [formField]="confirmForm.confirmation"
        [attr.aria-label]="'Type ' + expectedKey() + ' to confirm deletion'"
        data-testid="secret-delete-confirmation-input"
      />
      @if (confirmForm.confirmation().errors().length > 0) {
        <mat-error>
          {{ confirmForm.confirmation().errors()[0].message }}
        </mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="secret-delete-actions">
  <button
    #cancelButton
    mat-button
    type="button"
    (click)="cancel()"
    aria-label="Cancel"
    data-testid="secret-delete-cancel"
  >
    Cancel
  </button>
  <button
    #confirmButton
    mat-flat-button
    color="warn"
    type="button"
    data-testid="secret-delete-confirm"
    [disabled]="!canConfirm()"
    [attr.aria-label]="confirmLabel"
    (click)="onConfirm($event)"
  >
    {{ confirmLabel }}
  </button>
</mat-dialog-actions>
