<section class="empty-wrapper">
  <mat-card appearance="outlined" class="empty-card">
    <mat-card-header>
      <mat-icon mat-card-avatar aria-hidden="true">lock</mat-icon>
      <mat-card-title>Select a project to manage secrets</mat-card-title>
      <mat-card-subtitle>Pick one from the toolbar picker.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>
        Secrets are scoped to a project. Use the project picker in the top toolbar to choose which
        project's keys you want to view or edit.
      </p>
      @if (current(); as active) {
        <p class="active-hint">
          Current project: <strong>{{ active.name }}</strong>
        </p>
      }
    </mat-card-content>
  </mat-card>
</section>
